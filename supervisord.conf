[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:openvscode-server]
command=/opt/openvscode-server/bin/openvscode-server --host 127.0.0.1 --port 8000 --without-connection-token --default-folder /data/workspace --user-data-dir /data/.openvscode --extensions-dir /data/.openvscode/extensions
priority=100
autostart=true
autorestart=true
stdout_logfile=/var/log/openvscode.log
stderr_logfile=/var/log/openvscode.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=VSCODE_SETTINGS="/app/config/vscode-settings.json"

[program:mem0]
command=python3 -m uvicorn server:app --host 0.0.0.0 --port 8100
directory=/opt/mem0
priority=150
autostart=true
autorestart=true
stdout_logfile=/var/log/mem0.log
stderr_logfile=/var/log/mem0.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=DATA_DIR="/data"

[program:n8n]
command=n8n start
directory=/data/n8n
priority=160
autostart=true
autorestart=true
stdout_logfile=/var/log/n8n.log
stderr_logfile=/var/log/n8n.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=N8N_PORT="5678",N8N_PROTOCOL="http",N8N_HOST="0.0.0.0",N8N_USER_FOLDER="/data/n8n",N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN="true",WEBHOOK_URL="https://renewed-spirit-production.up.railway.app"

[program:kernel-server]
command=tsx /app/kernel/server.ts
directory=/app
priority=200
autostart=true
autorestart=true
stdout_logfile=/var/log/kernel.log
stderr_logfile=/var/log/kernel.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
