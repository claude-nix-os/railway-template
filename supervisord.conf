[supervisord]
nodaemon=true
user=root
logfile=/data/logs/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/data/logs

[program:nextjs]
command=tsx /app/kernel/server.ts
directory=/app
user=claude
priority=10
autostart=true
autorestart=unexpected
startsecs=5
startretries=5
stdout_logfile=/data/logs/nextjs.log
stderr_logfile=/data/logs/nextjs-error.log
environment=NODE_ENV="production",PORT="%(ENV_PORT)s",DATA_DIR="%(ENV_DATA_DIR)s",JWT_SECRET="%(ENV_JWT_SECRET)s",CLAUDE_OS_AUTH_TOKEN="%(ENV_CLAUDE_OS_AUTH_TOKEN)s"

[program:mem0]
command=python3 /opt/mem0/server.py
directory=/opt/mem0
user=root
priority=20
autostart=true
autorestart=unexpected
startsecs=3
startretries=3
stdout_logfile=/data/logs/mem0.log
stderr_logfile=/data/logs/mem0-error.log
environment=DATA_DIR="%(ENV_DATA_DIR)s"

[program:n8n]
command=n8n start
directory=/data
user=claude
priority=30
autostart=true
autorestart=unexpected
startsecs=10
startretries=3
stdout_logfile=/data/logs/n8n.log
stderr_logfile=/data/logs/n8n-error.log
environment=N8N_PORT="5678",N8N_PROTOCOL="http",N8N_HOST="0.0.0.0",N8N_USER_FOLDER="/data/n8n",DB_TYPE="sqlite",DB_SQLITE_DATABASE="/data/n8n/database.sqlite",N8N_ENCRYPTION_KEY="%(ENV_N8N_ENCRYPTION_KEY)s",N8N_DIAGNOSTICS_ENABLED="false",N8N_PERSONALIZATION_ENABLED="false",N8N_TEMPLATES_ENABLED="false",GENERIC_TIMEZONE="UTC",N8N_SECURE_COOKIE="false"
