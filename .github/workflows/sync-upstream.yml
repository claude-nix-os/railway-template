name: Sync from ClaudeOS
on:
  repository_dispatch:
    types: [claudeos-release]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest ClaudeOS kernel
        run: |
          git remote add upstream https://github.com/claude-nix-os/ClaudeOS.git || true
          git fetch upstream main

      - name: Update kernel files
        run: |
          # Copy kernel files from upstream
          git checkout upstream/main -- kernel/ src/app/layout.tsx src/app/page.tsx src/app/api/auth/ src/app/api/modules/

      - name: Commit and push
        run: |
          git config user.name "ClaudeOS Bot"
          git config user.email "bot@claudeos.local"
          git add -A
          git diff --staged --quiet || git commit -m "chore: sync kernel from ClaudeOS upstream"
          git push
